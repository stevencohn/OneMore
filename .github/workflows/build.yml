name: Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup devenv
        uses: seanmiddleditch/gha-setup-vsdevenv@master
        # TODO: pin to a commit SHA for supply-chain safety, e.g.:
        # uses: seanmiddleditch/gha-setup-vsdevenv@<sha>

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Build solution
        shell: pwsh
        run: .\build.ps1 -Architecture x64

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: OneMore-x64-installer
          path: ${{ env.USERPROFILE }}\Downloads\OneMore_*_Setupx64.msi
